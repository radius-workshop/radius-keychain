[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.28"
optimizer = true
optimizer_runs = 10000
evm_version = "cancun"

remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
]

[rpc_endpoints]
radius_testnet = "https://rpc-testnet.radiustech.xyz"
radius_mainnet = "https://rpc.radiustech.xyz"
